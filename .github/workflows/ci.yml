name: CI — Silicon to Software (S2S)

on:
  push:
    branches: [main, "ai/pipeline/**"]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint & Unit Tests ────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          # Check only errors (E, F), ignore warnings (W) and legacy app.py
          ruff check . --select=E,F --ignore=E501 --exclude=app.py

      - name: Run unit tests
        env:
          DATABASE_URL: sqlite:///./test_pipeline.db
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_ENV: test
          DEBUG: "false"
        run: |
          pip install pytest pytest-asyncio httpx
          python -m pytest tests/ -q --tb=short --ignore=tests/integration

  # ── 2. Frontend Build ───────────────────────────────────────────────────────
  frontend:
    name: React Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: hardware-pipeline-v5-react/package-lock.json

      - name: Install frontend deps
        working-directory: hardware-pipeline-v5-react
        run: npm ci

      - name: Build React bundle
        working-directory: hardware-pipeline-v5-react
        run: npx vite build

      - name: Bundle into single HTML
        working-directory: .
        run: python bundle_and_escape.py

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-bundle
          path: frontend/bundle.html
          retention-days: 7

  # ── 3. Docker Build & Push ──────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Download the built bundle so Docker image includes latest frontend
      - name: Download frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: frontend-bundle
          path: frontend/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
